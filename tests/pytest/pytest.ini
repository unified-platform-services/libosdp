[pytest]
testpaths = .
addopts = -ra --strict-markers
markers =
    unit: no threads and no bus; runs in milliseconds
    integration: spins up a CP/PD pair over a channel
    slow: takes more than 5s of wall clock (offline timeouts)
    multidrop: needs the MultidropBus

# Nothing bounds a wedged refresh thread, so a stuck channel would otherwise
# hang the run forever.
timeout = 60
timeout_method = thread
